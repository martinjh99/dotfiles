<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <alias>
        <family>YOUR_ENGLISH_FONT_NAME</family>
        <prefer>
            <family>YOUR_ENGLISH_FONT_NAME</family>
            <family>YOUR_ARABIC_FONT_NAME</family>
        </prefer>
    </alias>

    <alias>
        <family>monospace</family>
        <prefer>
            <family>YOUR_ENGLISH_FONT_NAME</family>
            <family>YOUR_ARABIC_FONT_NAME</family>
        </prefer>
    </alias>
</fontconfig>

